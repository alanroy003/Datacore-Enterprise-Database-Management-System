# docker-compose.yml
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

  celery:
    build: .
    command: celery -A config.celery worker -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

  celery_beat:
    build: .
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  redis_data:
